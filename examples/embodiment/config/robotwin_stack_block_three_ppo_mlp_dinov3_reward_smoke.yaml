# Robotwin stack_block_three minimum integration test with DINOv3 reward
# Validates: env init -> rollout -> reward model -> actor training loop
#
# Usage:
#   cd RLinf/examples/embodiment
#   python train_embodied_agent.py --config-name=robotwin_stack_block_three_ppo_mlp_dinov3_reward_smoke
#
# Prerequisites:
#   1. Replace TASK_NAME below with the exact task name on your server
#   2. Replace EXPERT_REF_IMAGE_PATH with your expert reference image
#   3. Confirm obs_dim matches your Robotwin state dimension
#   4. Confirm seeds_path points to your server's seeds JSON

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0
    reward: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_stack_three_dinov3_smoke"
    logger_backends: ["tensorboard"]

  # Minimal: exit after 5 steps
  max_epochs: 1
  max_steps: 5
  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  update_epoch: 1
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0
  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: False
    use_rel_reward: False
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    assets_path: "/root/autodl-tmp/robotwin-pi05-assets"
    # IMPORTANT: Update this to your server's train seeds path
    seeds_path: "/root/autodl-tmp/robotwin-pi05-data/seeds/train_seeds.json"
    enable_offload: False
    task_config:
      # IMPORTANT: Replace with exact task name from your server
      task_name: "stack_block_three"

  eval:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    group_size: 1
    use_fixed_reset_state_ids: True
    assets_path: "/root/autodl-tmp/robotwin-pi05-assets"
    # IMPORTANT: Update this to your server's eval seeds path
    seeds_path: "/root/autodl-tmp/robotwin-pi05-data/seeds/eval_seeds.json"
    enable_offload: False
    task_config:
      task_name: "stack_block_three"
    video_cfg:
      save_video: False
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 64
  seed: 1234
  enable_offload: False
  model:
    model_path: ""
    model_type: "mlp_policy"
    # IMPORTANT: Confirm this matches your Robotwin state dimension
    # Common values: 14 (arm joints + gripper) or check by running once
    obs_dim: 14
    action_dim: 14
    num_action_chunks: 1
    add_value_head: True
    add_q_head: False
    precision: "fp32"
  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: True
  group_name: "RewardGroup"
  reward_mode: "terminal"
  continuous_reward: True
  reward_threshold: 0.5
  reward_weight: 1.0
  env_reward_weight: 0.0
  enable_offload: False

  model:
    model_path: null
    model_type: "dinov3"
    model_name: "/root/autodl-tmp/checkpoints/dinov3/dinov3-vitl16-pretrain-lvd1689m"
    # IMPORTANT: Replace with your actual expert reference image path
    # This should be a screenshot of the successful stack_block_three state
    expert_ref_image_path: null
    temperature: 1.0
    image_size: [3, 224, 224]
    normalize: false
    precision: "fp32"

critic:
  use_critic_model: False
