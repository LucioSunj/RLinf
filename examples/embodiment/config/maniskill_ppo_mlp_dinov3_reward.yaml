# ManiSkill PPO with State policy + DINOv3 similarity reward model
# Policy uses state observations, reward model uses RGB images compared to expert reference
#
# Usage:
#   cd RLinf/examples/embodiment
#   python train_embodied_agent.py --config-name=maniskill_ppo_mlp_dinov3_reward
#
# Prerequisites:
#   1. Set expert_ref_image_path to your expert reference image (accessible from all nodes)
#   2. Ensure HF token is configured if DINOv3 weights need to be downloaded
#   3. Adjust cluster.component_placement for your GPU topology

defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# ---------------------------------------------------------------------------
# Cluster topology: adjust per your cloud setup
# ---------------------------------------------------------------------------
cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0    # Actor training worker (needs GPU)
    env: 0-0      # Environment workers (can share GPU with actor on small scale)
    rollout: 0-0  # Rollout / inference workers
    reward: 0-0   # Reward model worker (needs GPU for DINOv3 inference)

# ---------------------------------------------------------------------------
# Runner configuration
# ---------------------------------------------------------------------------
runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_dinov3_reward"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: False
  val_check_interval: 50
  save_interval: 100
  resume_dir: null

# ---------------------------------------------------------------------------
# Algorithm (PPO)
# ---------------------------------------------------------------------------
algorithm:
  update_epoch: 8
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0
  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

# ---------------------------------------------------------------------------
# Environment (ManiSkill PickCube with RGB observations for reward model)
# ---------------------------------------------------------------------------
env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 128
    wrap_obs_mode: simple
    auto_reset: True
    ignore_terminations: False
    use_rel_reward: False
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_full_state: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"           # MUST be "rgb" to provide images for DINOv3 reward
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all

  eval:
    total_num_envs: 32
    wrap_obs_mode: simple
    auto_reset: True
    ignore_terminations: True
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

# ---------------------------------------------------------------------------
# Rollout (inference) workers
# ---------------------------------------------------------------------------
rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: ${actor.model.precision}

# ---------------------------------------------------------------------------
# Actor (policy training) workers
# ---------------------------------------------------------------------------
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 6400
  global_batch_size: 6400
  seed: 1234
  enable_offload: False
  model:
    model_path: ""
    model_type: "mlp_policy"
    obs_dim: 42                # ManiSkill PickCube full state dimension
  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

# ---------------------------------------------------------------------------
# DINOv3 Reward Model
# ---------------------------------------------------------------------------
reward:
  use_reward_model: True
  group_name: "RewardGroup"

  # "terminal": only compute reward at episode end (prevents reward hacking)
  # "per_step": compute reward for every frame (higher resolution but risk of hacking)
  reward_mode: "terminal"

  # continuous_reward=True: keep raw DINOv3 similarity scores in [0, 1]
  # continuous_reward=False: binary threshold at reward_threshold
  continuous_reward: True
  reward_threshold: 0.5       # Only used when continuous_reward=False

  # How to combine learned rewards with environment rewards:
  #   final_reward = env_reward_weight * env_reward + reward_weight * model_reward
  reward_weight: 1.0
  env_reward_weight: 0.0

  enable_offload: False       # Set True to move DINOv3 to CPU between steps (saves VRAM)

  model:
    model_path: null
    model_type: "dinov3"

    # HuggingFace checkpoint. Alternatives:
    #   - facebook/dinov3-vits16-pretrain-lvd1689m  (small, 384-dim)
    #   - facebook/dinov3-vitb16-pretrain-lvd1689m  (base, 768-dim)
    #   - facebook/dinov3-vitl16-pretrain-lvd1689m  (large, 1024-dim, current)
    model_name: "/root/autodl-tmp/checkpoints/dinov3/dinov3-vitl16-pretrain-lvd1689m"

    # REQUIRED: absolute path to the expert reference image.
    # This image should be a PNG/JPEG showing the desired final state.
    # On multi-node setups, this path must be accessible from ALL nodes
    # (use NFS, shared cloud storage, or bake into the Docker image).
    expert_ref_image_path: null

    # RBF kernel bandwidth. Higher = reward less sensitive to distance.
    # Since DINOv3 embeddings are L2-normalized, distance^2 ∈ [0, 4],
    # so reward ∈ [exp(-4/T), 1]. Default 1.0 gives range [0.018, 1].
    temperature: 1.0

    image_size: [3, 224, 224]  # Kept for BaseImageRewardModel compatibility
    normalize: false           # DINOv3 AutoImageProcessor handles normalization internally
    precision: "fp32"          # fp32 recommended; fp16/bf16 may cause numerical issues with similarity

# ---------------------------------------------------------------------------
# Critic (value function) — disabled for this config
# ---------------------------------------------------------------------------
critic:
  use_critic_model: False
